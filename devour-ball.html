<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>먹깨비 볼 — 집어삼키기 액션</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#87ceeb;font-family:'Segoe UI',sans-serif;}
  #hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#234;
       background:rgba(255,255,255,.85);padding:8px 24px;border-radius:24px;font-size:15px;
       box-shadow:0 2px 12px rgba(0,0,0,.15);white-space:nowrap;}
  #hud b{color:#e8590c;}
  #bar{position:fixed;top:56px;left:50%;transform:translateX(-50%);width:260px;height:10px;
       background:rgba(255,255,255,.6);border-radius:6px;overflow:hidden;}
  #fill{height:100%;width:0;background:linear-gradient(90deg,#ffd93d,#e8590c);transition:width .3s;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
        color:rgba(0,0,0,.45);font-size:12px;background:rgba(255,255,255,.6);
        padding:6px 14px;border-radius:20px;white-space:nowrap;}
  #back{position:fixed;top:14px;left:14px;color:#345;text-decoration:none;font-size:13px;
        background:rgba(255,255,255,.8);padding:7px 12px;border-radius:18px;}
  #win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
       background:rgba(0,0,0,.45);color:#fff;font-size:34px;font-weight:bold;flex-direction:column;gap:14px;}
  #win button{font-size:16px;padding:10px 26px;border:none;border-radius:24px;background:#e8590c;color:#fff;cursor:pointer;}
</style>
</head>
<body>
<a id="back" href="portfolio.html">← 포트폴리오</a>
<div id="hud">🟠 지름 <b id="size">1.4m</b> &nbsp;·&nbsp; 삼킨 것 <b id="cnt">0</b>/<span id="tot">0</span></div>
<div id="bar"><div id="fill"></div></div>
<div id="hint">↑↓ (W/S) 이동 · ←→ (A/D) 카메라 회전 — 나보다 작은 것만 삼킬 수 있어요!</div>
<div id="win"><span>🎉 마을 정복 완료!</span><button onclick="location.reload()">다시 하기</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd8ef);
scene.fog = new THREE.Fog(0x9fd8ef, 60, 160);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 400);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,.6));
const sun = new THREE.DirectionalLight(0xfff5e0,.9);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-90; sun.shadow.camera.right=90;
sun.shadow.camera.top=90; sun.shadow.camera.bottom=-90;
scene.add(sun);

// 바닥
const ground = new THREE.Mesh(new THREE.CircleGeometry(110, 48),
  new THREE.MeshStandardMaterial({color:0x7ec46a, roughness:.95}));
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ---------- 플레이어 볼 ----------
let ballR = 0.7;
const ballGroup = new THREE.Group();      // 위치
const spin = new THREE.Group();           // 회전 (흡수물 부착)
const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 24),
  new THREE.MeshStandardMaterial({color:0xff7b2e, roughness:.4}));
ballMesh.castShadow = true;
// 무늬 (회전이 보이도록)
const dotG = new THREE.SphereGeometry(.18, 8, 6);
for(let i=0;i<10;i++){
  const d = new THREE.Mesh(dotG, new THREE.MeshStandardMaterial({color:0xffd93d}));
  const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
  d.position.set(Math.sin(p)*Math.cos(t), Math.cos(p), Math.sin(p)*Math.sin(t)).multiplyScalar(.95);
  ballMesh.add(d);
}
spin.add(ballMesh);
ballGroup.add(spin);
ballGroup.position.y = ballR;
scene.add(ballGroup);
function setBallSize(){ ballMesh.scale.setScalar(ballR); }
setBallSize();

// ---------- 오브젝트 생성 ----------
const objects = [];
function place(mesh, r){
  let x, z;
  do { x = (Math.random()-.5)*180; z = (Math.random()-.5)*180; }
  while(Math.hypot(x,z) < 8 || Math.hypot(x,z) > 95);
  mesh.position.x = x; mesh.position.z = z;
  mesh.rotation.y = Math.random()*Math.PI*2;
  mesh.traverse(o=>{ if(o.isMesh){ o.castShadow = true; } });
  scene.add(mesh);
  objects.push({mesh, r, absorbed:false});
}
const M = (c,r)=>new THREE.MeshStandardMaterial({color:c, roughness:r==null?.7:r});
const PALETTE = [0xff6b6b,0xffd93d,0x4d96ff,0xc77dff,0xff9f45,0x4dd0e1,0xf06292,0x95e06c];
const pick = a=>a[Math.floor(Math.random()*a.length)];

// 사탕/조약돌 (r .25~.45) x46
for(let i=0;i<46;i++){
  const r = .25+Math.random()*.2;
  const m = new THREE.Mesh(new THREE.SphereGeometry(r,12,10), M(pick(PALETTE),.4));
  m.position.y = r;
  place(m, r);
}
// 버섯 (r .4~.6) x24
for(let i=0;i<24;i++){
  const r = .4+Math.random()*.2;
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(r*.3,r*.4,r*1.2,8), M(0xfff2dd));
  stem.position.y = r*.6;
  const cap = new THREE.Mesh(new THREE.SphereGeometry(r,12,8,0,Math.PI*2,0,Math.PI/2), M(0xff6b6b,.5));
  cap.position.y = r*1.2;
  g.add(stem, cap);
  place(g, r);
}
// 상자 (r .6~1.1) x26
for(let i=0;i<26;i++){
  const r = .6+Math.random()*.5;
  const m = new THREE.Mesh(new THREE.BoxGeometry(r*1.6,r*1.6,r*1.6), M(0xc89b5f,.8));
  m.position.y = r*.8;
  place(m, r);
}
// 나무 (r 1.6~2.6) x22
for(let i=0;i<22;i++){
  const r = 1.6+Math.random();
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(r*.18,r*.24,r*1.4,8), M(0x8a5a33,.9));
  trunk.position.y = r*.7;
  const leaf = new THREE.Mesh(new THREE.ConeGeometry(r*.85, r*1.8, 10), M(0x3d8c40,.85));
  leaf.position.y = r*2;
  g.add(trunk, leaf);
  place(g, r);
}
// 자동차 (r 2~2.8) x12
for(let i=0;i<12;i++){
  const r = 2+Math.random()*.8;
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(r*1.8,r*.6,r*.9), M(pick(PALETTE),.35));
  body.position.y = r*.5;
  const top = new THREE.Mesh(new THREE.BoxGeometry(r*.9,r*.45,r*.8), M(0xd6ecff,.2));
  top.position.set(-r*.1, r*.95, 0);
  g.add(body, top);
  const wg = new THREE.CylinderGeometry(r*.22,r*.22,r*.15,10);
  [[-r*.55,r*.45],[r*.55,r*.45],[-r*.55,-r*.45],[r*.55,-r*.45]].forEach(([x,z])=>{
    const w = new THREE.Mesh(wg, M(0x222222,.9));
    w.rotation.x = Math.PI/2;
    w.position.set(x, r*.22, z);
    g.add(w);
  });
  place(g, r);
}
// 집 (r 3.5~5.5) x10
for(let i=0;i<10;i++){
  const r = 3.5+Math.random()*2;
  const g = new THREE.Group();
  const base = new THREE.Mesh(new THREE.BoxGeometry(r*1.4,r*1.1,r*1.4), M(pick([0xf2e3c6,0xe8d0d0,0xd0e0e8]),.85));
  base.position.y = r*.55;
  const roof = new THREE.Mesh(new THREE.ConeGeometry(r*1.15, r*.8, 4), M(0xb5482e,.8));
  roof.position.y = r*1.5;
  roof.rotation.y = Math.PI/4;
  g.add(base, roof);
  place(g, r);
}
document.getElementById('tot').textContent = objects.length;

// ---------- 조작 ----------
const keys = {};
addEventListener('keydown', e=>keys[e.code]=true);
addEventListener('keyup', e=>keys[e.code]=false);
let camYaw = 0;
const vel = new THREE.Vector3();
let absorbedCount = 0;
const WIN_R = 6.5;

// ---------- 루프 ----------
let last = performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-last)/1000, 1/30); last = now;

  // 카메라 회전
  if(keys.ArrowLeft||keys.KeyA) camYaw += dt*2.2;
  if(keys.ArrowRight||keys.KeyD) camYaw -= dt*2.2;
  // 전후 가속 (카메라 기준)
  const fwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const acc = 30 + ballR*6;
  if(keys.ArrowUp||keys.KeyW) vel.add(fwd.clone().multiplyScalar(acc*dt));
  if(keys.ArrowDown||keys.KeyS) vel.add(fwd.clone().multiplyScalar(-acc*dt*.7));
  vel.multiplyScalar(Math.pow(.18, dt)); // 마찰
  const maxV = 13 + ballR*2.5;
  if(vel.length() > maxV) vel.setLength(maxV);
  ballGroup.position.add(vel.clone().multiplyScalar(dt));
  // 맵 경계
  const dC = Math.hypot(ballGroup.position.x, ballGroup.position.z);
  if(dC > 102){
    ballGroup.position.x *= 102/dC; ballGroup.position.z *= 102/dC;
  }
  ballGroup.position.y = ballR;

  // 굴림 회전
  const sp = vel.length();
  if(sp > .01){
    const axis = new THREE.Vector3(0,1,0).cross(vel).normalize();
    const q = new THREE.Quaternion().setFromAxisAngle(axis, sp*dt/ballR);
    spin.quaternion.premultiply(q);
  }

  // 흡수 / 충돌
  for(const o of objects){
    if(o.absorbed) continue;
    const d = ballGroup.position.distanceTo(new THREE.Vector3(o.mesh.position.x, ballR, o.mesh.position.z));
    if(d < ballR + o.r*.85){
      if(o.r < ballR*.8){
        // 흡수!
        o.absorbed = true;
        spin.attach(o.mesh);
        // 표면에 붙이기
        const lp = o.mesh.position;
        if(lp.length() > .001) lp.setLength(ballR*.92);
        ballR = Math.cbrt(ballR**3 + (o.r*.62)**3);
        setBallSize();
        absorbedCount++;
        document.getElementById('cnt').textContent = absorbedCount;
        document.getElementById('size').textContent = (ballR*2).toFixed(1)+'m';
        document.getElementById('fill').style.width = Math.min(100, (ballR-.7)/(WIN_R-.7)*100)+'%';
        if(ballR >= WIN_R) document.getElementById('win').style.display = 'flex';
      } else {
        // 너무 큼 → 튕겨남
        const push = ballGroup.position.clone().sub(o.mesh.position).setY(0).normalize();
        ballGroup.position.add(push.multiplyScalar(ballR + o.r*.85 - d + .05));
        vel.reflect(push).multiplyScalar(.4);
      }
    }
  }

  // 카메라 추적
  const cd = 6 + ballR*5, ch = 3.5 + ballR*2.6;
  const cp = new THREE.Vector3(
    ballGroup.position.x + Math.sin(camYaw)*cd,
    ch,
    ballGroup.position.z + Math.cos(camYaw)*cd);
  camera.position.lerp(cp, 1 - Math.pow(.001, dt));
  camera.lookAt(ballGroup.position.x, ballR*.8, ballGroup.position.z);

  renderer.render(scene, camera);
}
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
requestAnimationFrame(animate);
</script>
</body>
</html>
