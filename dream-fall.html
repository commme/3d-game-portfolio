<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>드림 폴 — 꿈속 낙하</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#b8a8e8;font-family:'Segoe UI',sans-serif;}
  #hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#fff;
       font-size:16px;letter-spacing:1px;text-shadow:0 1px 8px rgba(80,60,140,.6);white-space:nowrap;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
        color:rgba(255,255,255,.7);font-size:12px;text-shadow:0 1px 4px rgba(80,60,140,.5);white-space:nowrap;}
  #back{position:fixed;top:14px;left:14px;color:#fff;text-decoration:none;font-size:13px;
        background:rgba(120,100,190,.4);padding:7px 12px;border-radius:18px;}
  #over{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
        flex-direction:column;gap:8px;background:rgba(40,30,70,.55);color:#fff;}
  #over h2{font-size:36px;margin:0;text-shadow:0 2px 16px rgba(0,0,0,.4);}
  #over p{font-size:17px;color:#e8dcff;margin:4px 0 14px;}
  #over button{font-size:16px;padding:10px 30px;border:none;border-radius:24px;
               background:#fff;color:#6a5ab0;cursor:pointer;font-weight:bold;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .6s;}
  #zzz{position:fixed;top:50px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;opacity:.85;}
</style>
</head>
<body>
<a id="back" href="portfolio.html">← 포트폴리오</a>
<div id="hud">💤 깊이 <span id="dep">0</span>m &nbsp;·&nbsp; ⭐ <span id="frag">0</span> &nbsp;·&nbsp; <span id="wake">😴😴😴</span></div>
<div id="zzz">더 깊은 꿈으로...</div>
<div id="hint">←→↑↓ (WASD) 떠다니기 · ⭐ 꿈 조각 수집 · ⏰ 알람시계 3번 닿으면 잠에서 깹니다</div>
<div id="over"><h2>⏰ 잠에서 깼다!</h2><p>꿈의 깊이 <span id="fdep">0</span>m · 꿈 조각 <span id="ffrag">0</span>개</p><button onclick="location.reload()">다시 잠들기</button></div>
<div id="flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, .1, 300);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,.85));
const warm = new THREE.DirectionalLight(0xffeedd,.6);
warm.position.set(5,10,8);
scene.add(warm);
scene.fog = new THREE.Fog(0xb8a8e8, 30, 110);

// ---------- 플레이어: 잠옷 입은 꼬마 ----------
const player = new THREE.Group();
const head = new THREE.Mesh(new THREE.SphereGeometry(.45,18,14),
  new THREE.MeshStandardMaterial({color:0xffe0c2, roughness:.6}));
head.position.y = .5;
const cap2 = new THREE.Mesh(new THREE.ConeGeometry(.4,.8,12),
  new THREE.MeshStandardMaterial({color:0x7a6ad0, roughness:.6}));
cap2.position.set(.1,1.05,0);
cap2.rotation.z = -.5;
const pompom = new THREE.Mesh(new THREE.SphereGeometry(.13,8,6),
  new THREE.MeshStandardMaterial({color:0xffffff}));
pompom.position.set(.45,1.3,0);
const pj = new THREE.Mesh(new THREE.CylinderGeometry(.3,.42,.9,10),
  new THREE.MeshStandardMaterial({color:0x9a8ae0, roughness:.7}));
pj.position.y = -.25;
player.add(head, cap2, pompom, pj);
scene.add(player);
// 꼬리 반짝이
const trailGeo = new THREE.BufferGeometry();
const TN = 60, tp = new Float32Array(TN*3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(tp,3));
const trail = new THREE.Points(trailGeo, new THREE.PointsMaterial({color:0xfff5aa, size:.3, transparent:true, opacity:.8}));
scene.add(trail);
let trailIdx = 0;

// ---------- 꿈 오브젝트 풀 ----------
// 모든 오브젝트는 위로 흘러감 (= 플레이어가 떨어짐)
const drifts = [];   // 장식
const stars = [];    // 꿈 조각
const clocks = [];   // 알람시계
function rngXZ(){ return [(Math.random()-.5)*36, (Math.random()-.5)*16]; }

function makeCloud(y){
  const c = new THREE.Group();
  for(let j=0;j<4;j++){
    const s = new THREE.Mesh(new THREE.SphereGeometry(1.1+Math.random()*1.2, 10, 8),
      new THREE.MeshStandardMaterial({color:0xffffff, roughness:1, transparent:true, opacity:.92}));
    s.position.set(j*1.6-2.4, (Math.random()-.5)*.7, (Math.random()-.5)*1.5);
    c.add(s);
  }
  const [x,z] = rngXZ();
  c.position.set(x*1.4, y, z*1.4-6);
  scene.add(c);
  drifts.push({m:c, rot:0});
}
function makeDoor(y){
  const g = new THREE.Group();
  const frame = new THREE.Mesh(new THREE.BoxGeometry(2.2,3.6,.25),
    new THREE.MeshStandardMaterial({color:[0xf3c4fb,0xa9def9,0xfcf6bd][Math.floor(Math.random()*3)], roughness:.7}));
  const knob = new THREE.Mesh(new THREE.SphereGeometry(.12,8,6),
    new THREE.MeshStandardMaterial({color:0xffd93d, metalness:.6}));
  knob.position.set(.7,0,.2);
  g.add(frame, knob);
  const [x,z] = rngXZ();
  g.position.set(x*1.3, y, z*1.3-5);
  g.rotation.y = Math.random()*Math.PI;
  scene.add(g);
  drifts.push({m:g, rot:(Math.random()-.5)*.5});
}
function makeWhale(y){
  const g = new THREE.Group();
  const wb = new THREE.Mesh(new THREE.SphereGeometry(2.2,16,12),
    new THREE.MeshStandardMaterial({color:0x8fb8de, roughness:.6}));
  wb.scale.set(1.7,.8,.9);
  const tail = new THREE.Mesh(new THREE.ConeGeometry(1,1.6,4),
    new THREE.MeshStandardMaterial({color:0x7da8ce, roughness:.6}));
  tail.position.set(-4,.5,0);
  tail.rotation.z = .8;
  g.add(wb, tail);
  const [x,z] = rngXZ();
  g.position.set(x*1.6, y, z*1.6-10);
  scene.add(g);
  drifts.push({m:g, rot:.1, sway:Math.random()*6});
}
function makeStar(y){
  const m = new THREE.Mesh(new THREE.OctahedronGeometry(.55,0),
    new THREE.MeshStandardMaterial({color:0xfff04d, emissive:0xcc9a00, roughness:.2}));
  const [x,z] = rngXZ();
  m.position.set(x, y, z);
  scene.add(m);
  stars.push({m, taken:false});
}
function makeClock(y){
  const g = new THREE.Group();
  const face = new THREE.Mesh(new THREE.CylinderGeometry(.7,.7,.35,16),
    new THREE.MeshStandardMaterial({color:0xff5a5a, roughness:.4}));
  face.rotation.x = Math.PI/2;
  const dial = new THREE.Mesh(new THREE.CylinderGeometry(.55,.55,.37,16),
    new THREE.MeshStandardMaterial({color:0xffffff, roughness:.3}));
  dial.rotation.x = Math.PI/2;
  const bellG = new THREE.SphereGeometry(.22,8,6);
  const bellM = new THREE.MeshStandardMaterial({color:0xffd93d, metalness:.5});
  const b1 = new THREE.Mesh(bellG, bellM); b1.position.set(-.4,.75,0);
  const b2 = new THREE.Mesh(bellG, bellM); b2.position.set(.4,.75,0);
  g.add(face, dial, b1, b2);
  const [x,z] = rngXZ();
  g.position.set(x, y, z);
  scene.add(g);
  clocks.push({g, sh:Math.random()*6});
}

// 초기 배치 (아래쪽에 깔아둠)
for(let y=-10; y>-160; y-=6){
  const r = Math.random();
  if(r<.3) makeCloud(y);
  else if(r<.45) makeDoor(y);
  else if(r<.52) makeWhale(y);
  if(Math.random()<.55) makeStar(y-3);
  if(Math.random()<.4) makeClock(y-2);
}

// ---------- 상태 ----------
let depth = 0, frags = 0, wakes = 0, over = false, fall = 9;
const keys = {};
addEventListener('keydown', e=>keys[e.code]=true);
addEventListener('keyup', e=>keys[e.code]=false);

const skyA = new THREE.Color(0xb8a8e8), skyB = new THREE.Color(0xffc4d6),
      skyC = new THREE.Color(0x8ec8e8), skyTmp = new THREE.Color();
function skyAt(d){
  const t = (Math.sin(d*.012)+1)/2;
  const u = (Math.sin(d*.005+2)+1)/2;
  skyTmp.copy(skyA).lerp(skyB, t).lerp(skyC, u*.5);
  return skyTmp;
}

function recycle(item, isGroup){
  // 화면 위로 지나간 것들을 아래로 재배치
  const obj = item.m || item.g;
  if(obj.position.y > 14){
    const [x,z] = rngXZ();
    obj.position.set(x, -120 - Math.random()*40, z);
    if(item.taken !== undefined){ item.taken = false; obj.visible = true; }
  }
}

// ---------- 루프 ----------
let last = performance.now(), T=0;
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-last)/1000, 1/30); last=now;
  T += dt;

  if(!over){
    fall = Math.min(22, fall + dt*.25);
    depth += fall*dt;
    document.getElementById('dep').textContent = Math.floor(depth);

    // 조종 (떠다니기)
    const sp = 13;
    if(keys.ArrowLeft||keys.KeyA) player.position.x -= sp*dt;
    if(keys.ArrowRight||keys.KeyD) player.position.x += sp*dt;
    if(keys.ArrowUp||keys.KeyW) player.position.z -= sp*dt*.8;
    if(keys.ArrowDown||keys.KeyS) player.position.z += sp*dt*.8;
    player.position.x = Math.max(-17, Math.min(17, player.position.x));
    player.position.z = Math.max(-8, Math.min(8, player.position.z));
    player.rotation.z = Math.sin(T*1.4)*.15 + ((keys.ArrowLeft||keys.KeyA)?.3:0) - ((keys.ArrowRight||keys.KeyD)?.3:0);
    player.rotation.x = Math.sin(T*.9)*.1;

    const dy = fall*dt;
    drifts.forEach(d=>{
      d.m.position.y += dy*.92;
      d.m.rotation.y += (d.rot||0)*dt;
      if(d.sway!==undefined){ d.sway+=dt; d.m.position.x += Math.sin(d.sway)*dt*1.5; }
      recycle(d);
    });
    stars.forEach(s=>{
      s.m.position.y += dy;
      s.m.rotation.y += dt*2.4;
      s.m.rotation.x += dt*1.1;
      recycle(s);
      if(!s.taken && player.position.distanceTo(s.m.position) < 1.5){
        s.taken = true; s.m.visible = false;
        frags++;
        document.getElementById('frag').textContent = frags;
      }
    });
    clocks.forEach(c=>{
      c.g.position.y += dy;
      c.sh += dt;
      c.g.rotation.z = Math.sin(c.sh*14)*.18; // 부들부들 떨림
      recycle(c);
      if(player.position.distanceTo(c.g.position) < 1.4 && c.g.visible){
        c.g.visible = false;
        wakes++;
        document.getElementById('wake').textContent = '😳'.repeat(wakes)+'😴'.repeat(Math.max(0,3-wakes));
        const f = document.getElementById('flash');
        f.style.opacity = .7;
        setTimeout(()=>f.style.opacity=0, 150);
        if(wakes>=3){
          over = true;
          document.getElementById('fdep').textContent = Math.floor(depth);
          document.getElementById('ffrag').textContent = frags;
          document.getElementById('over').style.display = 'flex';
        }
      }
    });

    // 하늘색 변화
    const sky = skyAt(depth);
    scene.background = sky;
    scene.fog.color = sky;

    // 반짝이 꼬리
    tp[trailIdx*3] = player.position.x + (Math.random()-.5)*.5;
    tp[trailIdx*3+1] = player.position.y + 1 + Math.random()*.5;
    tp[trailIdx*3+2] = player.position.z + (Math.random()-.5)*.5;
    trailIdx = (trailIdx+1)%TN;
    for(let i=0;i<TN;i++) tp[i*3+1] += dy*.9;
    trail.geometry.attributes.position.needsUpdate = true;
  }

  camera.position.lerp(new THREE.Vector3(player.position.x*.6, 5, player.position.z+13), 1-Math.pow(.005,dt));
  camera.lookAt(player.position.x, player.position.y-2, player.position.z);
  renderer.render(scene, camera);
}
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
requestAnimationFrame(animate);
</script>
</body>
</html>
