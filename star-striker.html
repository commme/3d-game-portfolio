<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>스타 스트라이커 — 3D 슈팅</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;cursor:crosshair;}
  #hud{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#9cf;
       font-size:16px;letter-spacing:1px;text-shadow:0 0 8px #36c;white-space:nowrap;}
  #hp{color:#ff6b8a;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
        color:rgba(255,255,255,.4);font-size:12px;white-space:nowrap;}
  #back{position:fixed;top:14px;left:14px;color:#688;text-decoration:none;font-size:13px;
        background:rgba(0,10,30,.6);padding:7px 12px;border-radius:18px;border:1px solid #235;}
  #over{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
        flex-direction:column;gap:10px;background:rgba(0,0,0,.6);color:#fff;}
  #over h2{font-size:38px;margin:0;color:#ff3d6e;text-shadow:0 0 18px #ff3d6e;}
  #over p{color:#9cf;font-size:18px;}
  #over button{font-size:16px;padding:10px 30px;border:1px solid #9cf;border-radius:24px;
               background:transparent;color:#9cf;cursor:pointer;}
  #over button:hover{background:rgba(150,200,255,.12);}
</style>
</head>
<body>
<a id="back" href="portfolio.html">← 포트폴리오</a>
<div id="hud">SCORE <span id="sc">0</span> &nbsp;·&nbsp; WAVE <span id="wv">1</span> &nbsp;·&nbsp; <span id="hp">❤❤❤</span></div>
<div id="hint">←→↑↓ (WASD) 기동 · 스페이스/클릭 연사 · 운석과 UFO를 격추하라</div>
<div id="over"><h2>SHIP DESTROYED</h2><p>SCORE <span id="fsc">0</span></p><button id="retry">재출격 (R)</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000010, 60, 180);
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, .1, 400);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x445577, 1.4));
const key = new THREE.DirectionalLight(0xaaccff, .9);
key.position.set(10,20,10);
scene.add(key);

// 별 배경 (이동)
const starGeo = new THREE.BufferGeometry();
const starN = 700, starPos = new Float32Array(starN*3);
for(let i=0;i<starN;i++){
  starPos[i*3] = (Math.random()-.5)*120;
  starPos[i*3+1] = (Math.random()-.5)*70;
  starPos[i*3+2] = -Math.random()*200;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x99aacc, size:.35}));
scene.add(stars);

// ---------- 플레이어 함선 ----------
const ship = new THREE.Group();
const hull = new THREE.Mesh(new THREE.ConeGeometry(.7, 2.6, 4),
  new THREE.MeshStandardMaterial({color:0x4d96ff, roughness:.3, metalness:.4, emissive:0x112244}));
hull.rotation.x = -Math.PI/2;
const wing = new THREE.Mesh(new THREE.BoxGeometry(3.2,.12,1),
  new THREE.MeshStandardMaterial({color:0x9adfff, roughness:.4, emissive:0x113355}));
wing.position.z = .6;
const engine = new THREE.PointLight(0x66aaff, 1.5, 10);
engine.position.z = 1.6;
ship.add(hull, wing, engine);
scene.add(ship);

// ---------- 상태 ----------
const lasers = [], enemies = [], parts = [];
let score, hp, wave, spawnT, running, fireT = 0;
const keys = {};
let firing = false;
addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault(); firing=true;}
  if(e.code==='KeyR' && !running) restart();
});
addEventListener('keyup', e=>{
  keys[e.code]=false;
  if(e.code==='Space') firing=false;
});
addEventListener('pointerdown', e=>{if(e.target.tagName!=='A'&&e.target.tagName!=='BUTTON')firing=true;});
addEventListener('pointerup', ()=>firing=false);
document.getElementById('retry').onclick = ()=>restart();

const laserGeo = new THREE.CylinderGeometry(.07,.07,2.4,6);
const laserMat = new THREE.MeshBasicMaterial({color:0x66ffcc});
function shoot(){
  for(const dx of [-0.9, 0.9]){
    const m = new THREE.Mesh(laserGeo, laserMat);
    m.rotation.x = Math.PI/2;
    m.position.set(ship.position.x+dx, ship.position.y, ship.position.z-1);
    scene.add(m);
    lasers.push(m);
  }
}

function spawnEnemy(){
  const ufo = Math.random() < .3;
  let m, r, hpE, pts;
  if(ufo){
    const g = new THREE.Group();
    const disc = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,.4,18),
      new THREE.MeshStandardMaterial({color:0xc77dff, roughness:.3, metalness:.5, emissive:0x331144}));
    const dome = new THREE.Mesh(new THREE.SphereGeometry(.7,14,8,0,Math.PI*2,0,Math.PI/2),
      new THREE.MeshStandardMaterial({color:0xeeccff, roughness:.2, emissive:0x442266}));
    dome.position.y = .2;
    g.add(disc, dome);
    m = g; r = 1.7; hpE = 2; pts = 150;
  } else {
    const c = [0x8a7a6a, 0x7a6a5a, 0x9a8a7a][Math.floor(Math.random()*3)];
    m = new THREE.Mesh(new THREE.IcosahedronGeometry(.9+Math.random()*.9, 0),
      new THREE.MeshStandardMaterial({color:c, roughness:.95, flatShading:true}));
    r = m.geometry.parameters.radius; hpE = 1; pts = 50;
  }
  m.position.set((Math.random()-.5)*30, (Math.random()-.5)*14, -160);
  scene.add(m);
  enemies.push({m, r, hp:hpE, pts, ufo, sway:Math.random()*6,
    sp: 22 + wave*2.5 + Math.random()*8,
    rx:(Math.random()-.5)*2, ry:(Math.random()-.5)*2});
}

function explode(p, c, n){
  for(let i=0;i<n;i++){
    const m = new THREE.Mesh(new THREE.BoxGeometry(.22,.22,.22),
      new THREE.MeshBasicMaterial({color:c, transparent:true}));
    m.position.copy(p);
    const v = new THREE.Vector3((Math.random()-.5)*16,(Math.random()-.5)*16,(Math.random()-.5)*16);
    scene.add(m);
    parts.push({m, v, life:.7});
  }
}

function restart(){
  lasers.forEach(l=>scene.remove(l)); lasers.length=0;
  enemies.forEach(e=>scene.remove(e.m)); enemies.length=0;
  parts.forEach(p=>scene.remove(p.m)); parts.length=0;
  score=0; hp=3; wave=1; spawnT=0; running=true;
  ship.position.set(0,0,14);
  document.getElementById('sc').textContent=0;
  document.getElementById('wv').textContent=1;
  document.getElementById('hp').textContent='❤❤❤';
  document.getElementById('over').style.display='none';
}

function hitShip(){
  hp--;
  document.getElementById('hp').textContent = '❤'.repeat(Math.max(0,hp));
  explode(ship.position, 0xff6688, 24);
  if(hp<=0){
    running=false;
    document.getElementById('fsc').textContent = score;
    document.getElementById('over').style.display='flex';
  }
}

// ---------- 루프 ----------
let last = performance.now(), T=0;
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-last)/1000, 1/30); last=now;
  T += dt;

  if(running){
    // 기동
    const sp = 18;
    if(keys.ArrowLeft||keys.KeyA) ship.position.x -= sp*dt;
    if(keys.ArrowRight||keys.KeyD) ship.position.x += sp*dt;
    if(keys.ArrowUp||keys.KeyW) ship.position.y += sp*dt*.8;
    if(keys.ArrowDown||keys.KeyS) ship.position.y -= sp*dt*.8;
    ship.position.x = Math.max(-16, Math.min(16, ship.position.x));
    ship.position.y = Math.max(-8, Math.min(8, ship.position.y));
    ship.rotation.z = (keys.ArrowLeft||keys.KeyA ? .4 : 0) - (keys.ArrowRight||keys.KeyD ? .4 : 0);
    ship.rotation.x = (keys.ArrowUp||keys.KeyW ? -.2 : 0) + (keys.ArrowDown||keys.KeyS ? .2 : 0);

    // 발사
    fireT -= dt;
    if(firing && fireT<=0){ shoot(); fireT = .16; }

    // 레이저
    for(let i=lasers.length-1;i>=0;i--){
      lasers[i].position.z -= 90*dt;
      if(lasers[i].position.z < -180){ scene.remove(lasers[i]); lasers.splice(i,1); }
    }

    // 적 스폰
    spawnT -= dt;
    if(spawnT<=0){
      spawnEnemy();
      spawnT = Math.max(.25, 1.1 - wave*.09);
    }
    wave = 1 + Math.floor(score/1000);
    document.getElementById('wv').textContent = wave;

    // 적 이동/충돌
    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      e.m.position.z += e.sp*dt;
      if(e.ufo){
        e.sway += dt*2;
        e.m.position.x += Math.sin(e.sway)*dt*8;
      } else {
        e.m.rotation.x += e.rx*dt; e.m.rotation.y += e.ry*dt;
      }
      // 레이저 명중
      let killed = false;
      for(let j=lasers.length-1;j>=0;j--){
        if(lasers[j].position.distanceTo(e.m.position) < e.r+.5){
          scene.remove(lasers[j]); lasers.splice(j,1);
          e.hp--;
          explode(e.m.position, 0xffffaa, 5);
          if(e.hp<=0){
            explode(e.m.position, e.ufo?0xc77dff:0xff9f45, 18);
            score += e.pts;
            document.getElementById('sc').textContent = score;
            killed = true;
          }
          break;
        }
      }
      if(killed){ scene.remove(e.m); enemies.splice(i,1); continue; }
      // 플레이어 충돌
      if(e.m.position.z > 11 && e.m.position.distanceTo(ship.position) < e.r+1.2){
        scene.remove(e.m); enemies.splice(i,1);
        hitShip();
        continue;
      }
      if(e.m.position.z > 24){ scene.remove(e.m); enemies.splice(i,1); }
    }
  }

  // 파편
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.life -= dt;
    p.m.position.add(p.v.clone().multiplyScalar(dt));
    p.m.material.opacity = Math.max(0, p.life/.7);
    if(p.life<=0){ scene.remove(p.m); parts.splice(i,1); }
  }

  // 별 흐름
  const sp2 = stars.geometry.attributes.position;
  for(let i=0;i<starN;i++){
    let z = sp2.getZ(i) + 40*dt;
    if(z > 20) z = -200;
    sp2.setZ(i, z);
  }
  sp2.needsUpdate = true;

  // 카메라: 함선을 살짝 따라감
  camera.position.set(ship.position.x*.4, ship.position.y*.4+2.5, 24);
  camera.lookAt(ship.position.x*.6, ship.position.y*.6, -30);

  renderer.render(scene, camera);
}
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
restart();
requestAnimationFrame(animate);
</script>
</body>
</html>
